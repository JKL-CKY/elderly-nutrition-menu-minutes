<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老人健康档案管理</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>👴 老人健康档案管理</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/elderly" class="active">老人档案</a>
                <a href="/nutrition">营养计算器</a>
                <a href="/meeting">会议管理</a>
                <a href="/menu">菜单管理</a>
            </nav>
        </header>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">老人列表</h2>
                <button class="btn btn-primary" onclick="openModal('addElderlyModal')">+ 新增老人</button>
            </div>
            
            <div id="elderlyList">
                <div class="loading active">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </div>
        </div>

        <div id="addElderlyModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>新增老人档案</h3>
                    <span class="close-btn" onclick="closeModal('addElderlyModal')">&times;</span>
                </div>
                <form id="addElderlyForm">
                    <div class="grid">
                        <div class="form-group">
                            <label>姓名 *</label>
                            <input type="text" name="name" required>
                        </div>
                        <div class="form-group">
                            <label>年龄</label>
                            <input type="number" name="age">
                        </div>
                        <div class="form-group">
                            <label>性别</label>
                            <select name="gender">
                                <option value="">请选择</option>
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>房间号</label>
                            <input type="text" name="room_number">
                        </div>
                        <div class="form-group">
                            <label>体重(kg)</label>
                            <input type="number" step="0.1" name="weight">
                        </div>
                        <div class="form-group">
                            <label>身高(cm)</label>
                            <input type="number" step="0.1" name="height">
                        </div>
                        <div class="form-group">
                            <label>活动水平</label>
                            <select name="activity_level">
                                <option value="">请选择</option>
                                <option value="卧床">卧床</option>
                                <option value="轻度活动">轻度活动</option>
                                <option value="中度活动">中度活动</option>
                                <option value="高度活动">高度活动</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>食物质地要求</label>
                            <select name="food_texture">
                                <option value="">请选择</option>
                                <option value="普食">普食</option>
                                <option value="软食">软食</option>
                                <option value="半流食">半流食</option>
                                <option value="流食">流食</option>
                                <option value="泥状">泥状</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>既往病史</label>
                        <textarea name="medical_history" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>饮食禁忌</label>
                        <textarea name="dietary_restrictions" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>过敏史</label>
                        <textarea name="allergies" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">保存</button>
                </form>
            </div>
        </div>

        <div id="detailModal" class="modal">
            <div class="modal-content" style="max-width: 800px;">
                <div class="modal-header">
                    <h3 id="detailTitle">老人详情</h3>
                    <span class="close-btn" onclick="closeModal('detailModal')">&times;</span>
                </div>
                <div id="detailContent"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        let currentElderly = null;

        async function loadElderlyList() {
            try {
                const elderly = await apiCall('/api/elderly');
                renderElderlyList(elderly);
            } catch (e) {
                document.getElementById('elderlyList').innerHTML = 
                    '<p style="color: red;">加载失败，请刷新页面重试</p>';
            }
        }

        function renderElderlyList(elderlyList) {
            if (elderlyList.length === 0) {
                document.getElementById('elderlyList').innerHTML = '<p>暂无老人档案，请点击上方按钮添加</p>';
                return;
            }

            let html = '<table><thead><tr><th>姓名</th><th>年龄</th><th>性别</th><th>房间号</th><th>BMI</th><th>饮食要求</th><th>操作</th></tr></thead><tbody>';
            
            elderlyList.forEach(e => {
                const bmiClass = e.bmi < 18.5 ? 'badge-warning' : 
                               e.bmi >= 24 ? 'badge-danger' : 'badge-success';
                html += `
                    <tr>
                        <td>${e.name}</td>
                        <td>${e.age || '-'}</td>
                        <td>${e.gender || '-'}</td>
                        <td>${e.room_number || '-'}</td>
                        <td><span class="badge ${bmiClass}">${e.bmi || '-'}</span></td>
                        <td>${e.food_texture || '-'}</td>
                        <td>
                            <button class="btn btn-primary" style="padding: 5px 10px; font-size: 12px;" onclick="viewDetail(${e.id})">查看</button>
                            <button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="deleteElderly(${e.id})">删除</button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            document.getElementById('elderlyList').innerHTML = html;
        }

        async function viewDetail(id) {
            try {
                const elderly = await apiCall(`/api/elderly/${id}`);
                const healthRecords = await apiCall(`/api/elderly/${id}/health-records`);
                const familyMembers = await apiCall(`/api/elderly/${id}/family-members`);
                
                currentElderly = elderly;
                
                let html = `
                    <div class="grid" style="margin-bottom: 20px;">
                        <div>
                            <p><strong>姓名：</strong>${elderly.name}</p>
                            <p><strong>年龄：</strong>${elderly.age || '-'}</p>
                            <p><strong>性别：</strong>${elderly.gender || '-'}</p>
                            <p><strong>房间号：</strong>${elderly.room_number || '-'}</p>
                        </div>
                        <div>
                            <p><strong>身高：</strong>${elderly.height || '-'} cm</p>
                            <p><strong>体重：</strong>${elderly.weight || '-'} kg</p>
                            <p><strong>BMI：</strong>${elderly.bmi || '-'}</p>
                            <p><strong>活动水平：</strong>${elderly.activity_level || '-'}</p>
                        </div>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <p><strong>既往病史：</strong>${elderly.medical_history || '无'}</p>
                        <p><strong>饮食禁忌：</strong>${elderly.dietary_restrictions || '无'}</p>
                        <p><strong>过敏史：</strong>${elderly.allergies || '无'}</p>
                        <p><strong>食物质地：</strong>${elderly.food_texture || '普食'}</p>
                    </div>
                `;

                html += '<h4 style="margin: 20px 0 10px;">健康记录</h4>';
                if (healthRecords.length > 0) {
                    html += '<table><thead><tr><th>日期</th><th>血压</th><th>血糖</th><th>胆固醇</th><th>备注</th></tr></thead><tbody>';
                    healthRecords.forEach(r => {
                        html += `<tr>
                            <td>${formatDate(r.record_date)}</td>
                            <td>${r.blood_pressure || '-'}</td>
                            <td>${r.blood_sugar || '-'}</td>
                            <td>${r.cholesterol || '-'}</td>
                            <td>${r.notes || '-'}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                } else {
                    html += '<p>暂无健康记录</p>';
                }

                html += '<h4 style="margin: 20px 0 10px;">家属信息</h4>';
                if (familyMembers.length > 0) {
                    html += '<table><thead><tr><th>姓名</th><th>关系</th><th>邮箱</th><th>电话</th><th>是否代表</th></tr></thead><tbody>';
                    familyMembers.forEach(m => {
                        html += `<tr>
                            <td>${m.name || '-'}</td>
                            <td>${m.relationship || '-'}</td>
                            <td>${m.email || '-'}</td>
                            <td>${m.phone || '-'}</td>
                            <td>${m.is_representative ? '<span class="badge badge-success">是</span>' : '否'}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                } else {
                    html += '<p>暂无家属信息</p>';
                }

                document.getElementById('detailTitle').textContent = elderly.name + ' 的档案详情';
                document.getElementById('detailContent').innerHTML = html;
                openModal('detailModal');
            } catch (e) {
                showAlert('加载详情失败', 'error');
            }
        }

        async function deleteElderly(id) {
            if (!confirm('确定要删除该老人档案吗？')) return;
            
            try {
                await apiCall(`/api/elderly/${id}`, 'DELETE');
                showAlert('删除成功');
                loadElderlyList();
            } catch (e) {
                showAlert('删除失败', 'error');
            }
        }

        document.getElementById('addElderlyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {};
            formData.forEach((value, key) => {
                if (value) data[key] = value;
            });
            
            try {
                await apiCall('/api/elderly', 'POST', data);
                showAlert('添加成功');
                closeModal('addElderlyModal');
                e.target.reset();
                loadElderlyList();
            } catch (err) {
                showAlert('添加失败', 'error');
            }
        });

        loadElderlyList();
    </script>
</body>
</html>
